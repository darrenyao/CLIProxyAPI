services:
  # Core Service: CLI Proxy API
  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest
    container_name: cli-proxy-api
    restart: unless-stopped
    volumes:
      - ./config.yaml:/CLIProxyAPI/config.yaml
      - ./auths:/root/.cli-proxy-api
      - ./logs:/CLIProxyAPI/logs
      - ./static:/CLIProxyAPI/static
      - ./CLIProxyAPI:/CLIProxyAPI/CLIProxyAPI
    environment:
      - TZ=Asia/Shanghai
    # Expose CLIProxyAPI port to host for system Nginx to access
    ports:
      - "127.0.0.1:8317:8317"
    networks:
      - cli-proxy-network

  # Monitoring: Dozzle (Real-time Log Viewer)
  # Access at http://your-ip:8888
  dozzle:
    image: amir20/dozzle:latest
    container_name: cliproxy-monitor
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_USERNAME: admin
      DOZZLE_PASSWORD: cliproxy_admin_2026
    networks:
      - cli-proxy-network

  # Maintenance: Watchtower (Auto-update images)
  watchtower:
    image: containrrr/watchtower
    container_name: cliproxy-updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --cleanup
    networks:
      - cli-proxy-network

networks:
  cli-proxy-network:
    driver: bridge
